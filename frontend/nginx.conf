server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly; fall back to index.html for all other paths.
    # Required for the ?role=instructor query-param routing used by App.tsx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets aggressively (Vite adds content hashes to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
