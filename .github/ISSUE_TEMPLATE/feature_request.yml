name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check [ROADMAP.md](../../ROADMAP.md) to see if this is already planned,
        and [CONTRIBUTING.md](../../CONTRIBUTING.md) to understand what is in scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who benefits from it?
      placeholder: "As an instructor, I need ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why did you prefer this one?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area does this affect?
      options:
        - New scenario / clinical pathway
        - Student Dashboard UX
        - Instructor Dashboard
        - Reporting / Export
        - Backend API
        - Infrastructure / deployment
        - Documentation
        - Testing
        - Other
    validations:
      required: true

  - type: checkboxes
    id: clinical_review
    attributes:
      label: Clinical Review
      description: Changes to clinical workflows require expert review before merging.
      options:
        - label: This change does NOT alter clinical protocol logic or NRP workflow steps
