name: Bug Report
description: Report a reproducible bug or unexpected behaviour
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Start a session with scenario '...'
        2. Answer 'yes' to the second prompt
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error messages or console output if available.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Student Dashboard (frontend)
        - Instructor Dashboard (frontend)
        - Session Replay (frontend)
        - Voice Recognition / TTS
        - WebSocket connection
        - Backend API
        - Reporting (PDF / CSV / XLSX)
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python version, Node version, deployment method
      placeholder: |
        OS: Windows 11 / macOS 14 / Ubuntu 22.04
        Browser: Chrome 125
        Python: 3.10.12
        Node: 18.20.3
        Deployment: Local / Docker / Railway+Vercel
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Backend logs, browser console errors, or network tab output.
      render: shell
